name: Deploy Kingdom to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            kingdom/package-lock.json

      - name: Install root deps (gray-matter)
        run: npm ci

      - name: Install kingdom deps
        run: npm ci
        working-directory: kingdom

      - name: Build data.json from vault
        run: node scripts/build-data.js

      - name: Build kingdom app
        run: npm run build
        working-directory: kingdom

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kingdom/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
